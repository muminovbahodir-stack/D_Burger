<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D Burger</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
.header{padding:20px;background:#1a1a1a}
.logo{width:50px;height:50px;border-radius:50%;background:red;display:flex;align-items:center;justify-content:center;font-size:30px}
.hero{height:120px;background:orange;margin:10px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:60px}
.menu{padding:10px}
.item{text-align:center;margin-bottom:20px}
button{padding:10px;border-radius:10px;border:0;margin:5px;font-size:16px}
.add{background:#ffae16;color:#fff}
.minus{background:#ef4444;color:#fff}
.pay{background:#2db84d;color:#fff}
.support{background:#ffae16;color:#fff}
.cancel{background:#444;color:#fff}
.bottom{position:fixed;bottom:0;width:100%;background:#2db84d;padding:15px;text-align:center}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end}
.sheet{background:#111;width:100%;padding:20px;border-radius:20px 20px 0 0}
</style>
</head>

<body>

<div class="header">
<div class="logo">D</div>
<div class="hero">🍔🍟</div>
</div>

<div id="payText">Pay $0</div>

<div class="menu" id="menu"></div>

<div class="bottom">
<button onclick="openOrder()">VIEW ORDER</button>
</div>

<div class="modal" id="modal">
<div class="sheet">
<div id="orderList"></div>

<button class="cancel" onclick="cancelOrder()">❌ ОТМЕНИТЬ</button>
<button class="pay" onclick="pay()">💳 ЗАПЛАТИТЬ</button>
<button class="support" onclick="supportPay()">❤️ ПОДДЕРЖКА</button>

</div>
</div>

<script>

const items=[
{id:"burger",name:"Burger",price:5},
{id:"fries",name:"Fries",price:2},
{id:"pizza",name:"Pizza",price:8}
];

let cart={};

function add(id){
cart[id]=(cart[id]||0)+1;
render();
}

function removeItem(id){
cart[id]=Math.max(0,(cart[id]||0)-1);
if(cart[id]==0)delete cart[id];
render();
}

function total(){
let t=0;
items.forEach(i=>{
t+= (cart[i.id]||0)*i.price;
});
return t;
}

function render(){
let html="";
items.forEach(i=>{
let q=cart[i.id]||0;
html+=`
<div class="item">
<h2>${i.name} $${i.price}</h2>
${q>0?
`<button class="minus" onclick="removeItem('${i.id}')">-</button>
<span>${q}</span>
<button class="add" onclick="add('${i.id}')">+</button>`
:
`<button class="add" onclick="add('${i.id}')">ADD</button>`
}
</div>`;
});
document.getElementById("menu").innerHTML=html;
document.getElementById("payText").innerText="Pay $"+total();
}

function openOrder(){
document.getElementById("modal").style.display="flex";
renderOrder();
}

function renderOrder(){
let html="";
items.forEach(i=>{
if(cart[i.id]){
html+=`${i.name} x${cart[i.id]}<br>`;
}
});
document.getElementById("orderList").innerHTML=html||"Empty";
}

function cancelOrder(){
cart={};
closeOrder();
render();
}

function pay(){
alert("Оплачено $"+total());
cart={};
closeOrder();
render();
}

function supportPay(){
alert("Спасибо за поддержку $"+total());
cart={};
closeOrder();
render();
}

function closeOrder(){
document.getElementById("modal").style.display="none";
}

render();

</script>

</body>
</html>
